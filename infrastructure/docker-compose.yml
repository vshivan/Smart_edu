version: '3.9'

services:
  # ─── DATABASES ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sel_postgres
    environment:
      POSTGRES_DB: smartedulear
      POSTGRES_USER: ${POSTGRES_USER:-sel_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sel_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sel_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    container_name: sel_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sel_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── BACKEND SERVICES ───────────────────────────────────────────────────────
  # Build context is always ../backend so each Dockerfile can COPY shared/
  api-gateway:
    build:
      context: ../backend
      dockerfile: api-gateway/Dockerfile
    container_name: sel_api_gateway
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    restart: unless-stopped

  auth-service:
    build:
      context: ../backend
      dockerfile: auth-service/Dockerfile
    container_name: sel_auth
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    restart: unless-stopped

  course-service:
    build:
      context: ../backend
      dockerfile: course-service/Dockerfile
    container_name: sel_course
    ports:
      - "3003:3003"
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  ai-service:
    build:
      context: ../backend
      dockerfile: ai-service/Dockerfile
    container_name: sel_ai
    ports:
      - "3004:3004"
    env_file: .env
    depends_on:
      mongodb: { condition: service_healthy }
    restart: unless-stopped

  quiz-service:
    build:
      context: ../backend
      dockerfile: quiz-service/Dockerfile
    container_name: sel_quiz
    ports:
      - "3005:3005"
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  gamification-service:
    build:
      context: ../backend
      dockerfile: gamification-service/Dockerfile
    container_name: sel_gamification
    ports:
      - "3006:3006"
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    restart: unless-stopped

  tutor-service:
    build:
      context: ../backend
      dockerfile: tutor-service/Dockerfile
    container_name: sel_tutor
    ports:
      - "3007:3007"
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  payment-service:
    build:
      context: ../backend
      dockerfile: payment-service/Dockerfile
    container_name: sel_payment
    ports:
      - "3008:3008"
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  notification-service:
    build:
      context: ../backend
      dockerfile: notification-service/Dockerfile
    container_name: sel_notification
    ports:
      - "3010:3010"
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    restart: unless-stopped

  admin-service:
    build:
      context: ../backend
      dockerfile: admin-service/Dockerfile
    container_name: sel_admin
    ports:
      - "3011:3011"
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  # ─── FRONTEND ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: sel_frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:
