services:
  # ─── DATABASES ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sel_postgres
    environment:
      POSTGRES_DB:       smartedulear
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    # No ports exposed — only accessible inside Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  mongodb:
    image: mongo:7-jammy
    container_name: sel_mongodb
    volumes:
      - mongo_data:/data/db
    # No ports exposed — only accessible inside Docker network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: sel_redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    # No ports exposed — only accessible inside Docker network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ─── BACKEND ────────────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sel_server
    # No direct port exposure — nginx proxies to it
    env_file: .env.production
    environment:
      NODE_ENV:     production
      PORT:         3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/smartedulear
      MONGODB_URL:  mongodb://mongodb:27017
      REDIS_URL:    redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      mongodb:  { condition: service_healthy }
      redis:    { condition: service_healthy }
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── FRONTEND + NGINX ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: sel_frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # SSL certs (Let's Encrypt)
      - certbot_www:/var/www/certbot:ro         # ACME challenge
    depends_on:
      server: { condition: service_healthy }
    restart: always

  # ─── CERTBOT (SSL auto-renewal) ──────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: sel_certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renews every 12h — certbot only acts when cert is <30 days from expiry
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    restart: always

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  certbot_www:
